<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Admin Panel</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            background-color: #0b1120;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #qrcode img {
            margin: 0 auto;
            border-radius: 0.5rem;
            border: 4px solid white;
            padding: 10px;
            background: white;
        }
    </style>
</head>
<body class="text-slate-200 antialiased flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/30">
                ðŸŽ«
            </div>
            <h1 class="text-xl font-bold tracking-tight">Ticketo<span class="gradient-text">Admin</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <a href="scanner.html" class="text-sm font-medium text-slate-300 hover:text-white transition-colors duration-200 px-4 py-2 rounded-full hover:bg-white/10">ðŸ“± Open Scanner</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Form Section -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass-panel rounded-3xl p-8 md:p-10 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
                    
                    <div class="mb-8">
                        <h2 class="text-3xl font-bold mb-2">Generate New Ticket</h2>
                        <p class="text-slate-400 text-sm">Enter customer details below to issue a unique QR ticket.</p>
                    </div>

                    <form id="ticketForm" class="space-y-6">
                        <!-- GAS URL config -->
                        <div class="p-4 rounded-xl border border-yellow-500/30 bg-yellow-500/10 mb-6">
                            <label class="block text-xs font-semibold text-yellow-400 uppercase tracking-wider mb-2">Setup Required - Google Apps Script URL</label>
                            <input type="url" id="gasUrl" required placeholder="https://script.google.com/macros/s/.../exec" class="w-full input-glass rounded-lg px-4 py-3 text-sm" value="">
                            <p class="text-xs text-yellow-200/60 mt-2">Paste your deployed Web App URL here before generating tickets.</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Name -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-slate-300">Full Name</label>
                                <input type="text" id="name" required placeholder="John Doe" class="w-full input-glass rounded-xl px-4 py-3 placeholder-slate-500">
                            </div>
                            <!-- Phone -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-slate-300">Phone Number</label>
                                <input type="tel" id="phone" required placeholder="+94 77 123 4567" class="w-full input-glass rounded-xl px-4 py-3 placeholder-slate-500">
                            </div>
                            <!-- Training ID -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-slate-300">Training ID</label>
                                <input type="text" id="training_id" required placeholder="TRN-0001" class="w-full input-glass rounded-xl px-4 py-3 placeholder-slate-500">
                            </div>
                            <div class="space-y-2 hidden md:block">
                                <!-- empty placeholder to preserve grid on large screens when inputs are odd count -->
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="submit" id="submitBtn" class="w-full group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl hover:from-blue-500 hover:to-purple-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 focus:ring-offset-slate-900 shadow-lg shadow-blue-500/25">
                                <span class="group-hover:scale-105 transition-transform duration-200 flex items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    Generate QR Ticket
                                </span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="lg:col-span-5 relative">
                <div class="glass-panel rounded-3xl p-8 flex flex-col items-center justify-center text-center min-h-[500px] border border-white/10 shadow-2xl relative overflow-hidden group">
                    <!-- Ticket Decorations -->
                    <div class="absolute -left-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-[#0b1120] rounded-full border border-white/10"></div>
                    <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-[#0b1120] rounded-full border border-white/10"></div>
                    <div class="absolute w-[90%] left-[5%] top-1/2 border-t-2 border-dashed border-white/10 z-0"></div>

                    <div id="ticketEmptyState" class="z-10 flex flex-col items-center space-y-4 opacity-50">
                        <div class="w-24 h-24 rounded-2xl bg-white/5 flex items-center justify-center mb-2">
                            <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                        </div>
                        <p class="font-medium text-slate-300">Ticket Preview will appear here</p>
                    </div>

                    <div id="ticketResult" class="hidden z-10 w-full animate-fade-in-up">
                        <div class="inline-block px-4 py-1 rounded-full bg-blue-500/20 text-blue-400 text-sm font-semibold mb-6 border border-blue-500/30">
                            Ticket Issued Successfully
                        </div>
                        
                        <!-- Custom Ticket Canvas Wrapper -->
                        <div class="mb-6 flex justify-center shadow-xl shadow-blue-500/10 rounded-2xl overflow-hidden hover:scale-105 transition-transform duration-300 relative group">
                            <canvas id="ticketCanvas" style="max-width: 100%; height: auto; display: block; border-radius: 12px; border: 4px solid white;"></canvas>
                            <!-- Hidden QR generation div -->
                            <div id="qrcode" class="hidden"></div>
                        </div>

                        <button id="downloadBtn" type="button" class="w-full mb-6 relative inline-flex items-center justify-center px-8 py-3 font-bold text-white transition-all duration-200 bg-emerald-600 rounded-xl hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-600 shadow-lg shadow-emerald-500/25">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download Ticket Image
                        </button>
                        
                        <div class="space-y-1 bg-white/5 p-4 rounded-xl backdrop-blur-sm border border-white/5 text-left">
                            <div class="flex justify-between items-center pb-2 border-b border-white/10">
                                <span class="text-xs text-slate-400 uppercase tracking-wider">Ticket ID</span>
                                <span id="resTicketId" class="font-bold text-white font-mono text-lg">---</span>
                            </div>
                            <div class="flex justify-between items-center py-2 border-b border-white/10">
                                <span class="text-xs text-slate-400 uppercase tracking-wider">Name</span>
                                <span id="resName" class="font-medium text-slate-200">---</span>
                            </div>
                            <div class="flex justify-between items-center py-2 border-b border-white/10">
                                <span class="text-xs text-slate-400 uppercase tracking-wider">Training ID</span>
                                <span id="resTrainingId" class="font-medium text-fuchsia-400">---</span>
                            </div>
                            <div class="flex justify-between items-center pt-2">
                                <span class="text-xs text-slate-400 uppercase tracking-wider">Timestamp</span>
                                <span id="resTime" class="text-sm text-slate-300">---</span>
                            </div>
                        </div>

                        <button type="button" onclick="resetForm()" class="mt-6 text-sm text-slate-400 hover:text-white underline underline-offset-4 transition-colors">Generate Another Ticket</button>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        // Load URL from local storage if exists
        document.addEventListener("DOMContentLoaded", () => {
            const savedUrl = localStorage.getItem('gasUrl');
            if (savedUrl) {
                document.getElementById('gasUrl').value = savedUrl;
            }
        });

        // Function to generate random Ticket ID
        function generateTicketID() {
            const randomNum = Math.floor(1000 + Math.random() * 9000); // 4 digit random
            // Optional: adds a quick timestamp part based on alpha string
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const randomChar1 = chars.charAt(Math.floor(Math.random() * chars.length));
            const randomChar2 = chars.charAt(Math.floor(Math.random() * chars.length));
            return `TKT-${randomChar1}${randomChar2}-${randomNum}`;
        }

        const form = document.getElementById('ticketForm');
        const submitBtn = document.getElementById('submitBtn');
        const qrcodeContainer = document.getElementById('qrcode');
        let qrcodeInstance = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) {
                Swal.fire({ title: 'Error!', text: 'Please enter the Google Apps Script URL first.', icon: 'error', background: '#1e293b', color: '#fff' });
                return;
            }
            
            // Save URL to localStorage
            localStorage.setItem('gasUrl', gasUrl);

            // Fetch form data
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const training_id = document.getElementById('training_id').value;
            
            const ticketId = generateTicketID();

            // Setup Data Payload
            const payload = JSON.stringify({
                action: 'addTicket',
                ticket_id: ticketId,
                name: name,
                phone: phone,
                training_id: training_id
            });

            // Change button state
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...';
            submitBtn.disabled = true;

            try {
                // Submit to Google Apps Script
                const response = await fetch(gasUrl, {
                    method: 'POST',
                    body: payload,
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    } // using text/plain completely bypasses CORS preflight blocks from Google
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    // Show success Notification
                    Swal.fire({
                        title: 'Success!',
                        text: 'Ticket has been issued and saved to Google Sheets.',
                        icon: 'success',
                        background: '#0f172a',
                        color: '#f8fafc',
                        confirmButtonColor: '#3b82f6'
                    });

                    // Reveal Ticket View
                    document.getElementById('ticketEmptyState').classList.add('hidden');
                    document.getElementById('ticketResult').classList.remove('hidden');

                    // Populate Data
                    document.getElementById('resTicketId').innerText = ticketId;
                    document.getElementById('resName').innerText = name;
                    document.getElementById('resTrainingId').innerText = training_id;
                    document.getElementById('resTime').innerText = new Date().toLocaleString();

                    // Generate QR Code
                    qrcodeContainer.innerHTML = ''; // clear old QR
                    qrcodeInstance = new QRCode(qrcodeContainer, {
                        text: ticketId,
                        width: 400, // High res for main ticket
                        height: 400,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });

                    // Draw on Template Image
                    setTimeout(() => {
                        const qrCanvas = qrcodeContainer.querySelector('canvas');
                        if (!qrCanvas) return;

                        const templateImg = new Image();
                        templateImg.onload = () => {
                            const canvas = document.getElementById('ticketCanvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = templateImg.width;
                            canvas.height = templateImg.height;
                            ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);
                            const W = canvas.width;
                            const H = canvas.height;
                            
                            const qrSize = Math.round(W * 0.610); 
                            const qrX = Math.round((W - qrSize) / 2);
                            const qrY = Math.round(H * 0.183); 
                            ctx.imageSmoothingEnabled = false;
                            ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
                            ctx.imageSmoothingEnabled = true;
                            
                            ctx.font = `bold ${Math.round(W*0.040)}px Arial, sans-serif`;
                            ctx.fillStyle = "#1e293b"; 
                            ctx.textAlign = "left";
                            const textX = Math.round(W * 0.136);
                            const textY = Math.round(H * 0.865); 
                            ctx.fillText(name.toUpperCase(), textX, textY);
                            
                            const dlBtn = document.getElementById('downloadBtn');
                            dlBtn.onclick = () => {
                                const safeName = name.replace(/[^a-zA-Z0-9]/g, '_');
                                const safeId = training_id.replace(/[^a-zA-Z0-9]/g, '_');
                                const link = document.createElement('a');     
                                link.download = `${safeName}_${safeId}_Ticket.png`;
                                link.href = canvas.toDataURL('image/png', 1.0);
                                link.click();
                            };
                        };
                        templateImg.onerror = () => {
                            Swal.fire({
                                title: 'Template Error!',
                                text: 'Failed to load template.',
                                icon: 'error',
                                background: '#1e293b', color: '#fff'
                            });
